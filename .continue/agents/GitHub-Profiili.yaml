name: GitHub Profiili
version: 1.0.0
schema: v1

models:
  # 1. THE CHAT MODEL (Stays as is, follows your rules)
  - name: Qwen3 Chat
    provider: ollama
    model: qwen3-coder  # Usually the -instruct version
    apiBase: http://localhost:11434
    roles:
      - chat
      - edit
      - apply

  # 2. THE AUTOCOMPLETE MODEL (Stripped down & specialized)
  - name: Qwen3 Autocomplete
    provider: ollama
    model: qwen2.5-coder:7b
    apiBase: http://localhost:11434
    roles:
      - autocomplete
    # This ensures it doesn't try to "talk" to you
    defaultCompletionOptions:
      temperature: 0.0 
      maxTokens: 128 # Autocomplete should be short
    # Explicitly tell Continue this is for FIM
    template: qwen

  - name: Qwen3 Embedding
    provider: ollama
    model: qwen3-embedding:0.6b
    apiBase: http://localhost:11434
    roles:
      - embed

mcpServers:
  # 1. Git — read commits, diffs, logs, branches
  #    PINNED to 2025.12.18 (3 CVEs fixed in this version, do NOT use @latest)
  #    --repository restricts it to current working dir only
  - name: Git
    command: wsl.exe
    args:
      - --
      - /home/miika/.local/bin/uvx
      - mcp-server-git@2025.12.18
      - --repository
      - /home/miika/GitHub/profile/miikakinnunen
    env:
      PATH: "/home/miika/.local/bin:/usr/local/bin:/usr/bin:/bin"
      PYTHONUNBUFFERED: "1"

  # # 2. Filesystem — read/list files in project dir ONLY
  # #    WARNING: narrow the path to your project root, never ~/ or /
  # #    If you combine this with Git MCP, be aware of the chained CVE history
  - name: Filesystem
    command: wsl.exe
    args:
      - --
      - /home/miika/.nvm/versions/node/v20.19.5/bin/node
      - /home/miika/.nvm/versions/node/v20.19.5/lib/node_modules/@modelcontextprotocol/server-filesystem/dist/index.js
      - /home/miika/GitHub/profile/miikakinnunen
    env:
      PATH: "/home/miika/.nvm/versions/node/v20.19.5/bin:/usr/local/bin:/usr/bin:/bin"

  # # 3. Brave Search — web search for docs, errors, package versions
  # #    Requires free API key: https://brave.com/search/api
  # #    Key must be exported in your shell: export BRAVE_API_KEY=your_key_here
  # - name: Brave Search
  #   command: npx
  #   args:
  #     - "-y"
  #     - "@modelcontextprotocol/server-brave-search"
  #   env:
  #     BRAVE_API_KEY: $BRAVE_API_KEY

  # 4. Memory — persistent knowledge graph across sessions
  #    Scoped to project so memories don't bleed across different codebases
  - name: Memory
    command: wsl.exe
    args:
      - --
      - /home/miika/.nvm/versions/node/v20.19.5/bin/node
      - /home/miika/.nvm/versions/node/v20.19.5/lib/node_modules/@modelcontextprotocol/server-memory/dist/index.js
    env:
      MEMORY_FILE_PATH: "./.continue/memory.json"
      PATH: "/home/miika/.nvm/versions/node/v20.19.5/bin:/usr/local/bin:/usr/bin:/bin"
  # # 5. SQLite — schema-aware DB access for local dev databases
  # #    ALWAYS point at a dev copy, NEVER production
  # - name: SQLite
  #   command: uvx
  #   args:
  #     - mcp-server-sqlite
  #     - --db-path
  #     - ./dev.db   # ← change to your actual dev DB path

context:
  - provider: code
  - provider: file
  - provider: terminal
  - provider: diff

rules:
  # Code clarity
  - Add comments for non-obvious logic, library usage, and any "why" that isn't clear from the code itself. Do not comment obvious things like "increment counter"
  - Use descriptive variable and function names. Avoid abbreviations unless they are universally understood (e.g. id, url, api)
  - Keep functions under 40 lines. If a function requires more than two sentences to describe what it does, suggest splitting it into smaller functions

  # Error handling
  - Always handle errors explicitly. Never silently swallow exceptions or errors
  - When writing async code always handle promise rejections and network failures

  # Suggestions & responses
  - When suggesting a fix, briefly explain what was wrong and why the fix works
  - If there are multiple valid approaches to a problem, mention the tradeoffs rather than just picking one silently
  - If my code has a potential bug or edge case you notice while helping with something else, point it out briefly
  - When introducing a library or pattern I may not be familiar with, add a one-line comment explaining what it does

  # What to avoid
  #- Do not over-engineer solutions. Prefer simple and readable over clever
  - Do not add placeholder comments like "add error handling here" — either implement it or leave it out
  - Do not rewrite code I did not ask you to change
  - Never use deprecated APIs or outdated patterns even if they work

  # File safety
  - Never perform any file delete or remove operations under any circumstances
  - When modifying existing code, comment out the original lines directly above the replacement using the correct comment syntax for the language. Add a brief inline note explaining the change
  - Before editing any file, state the filename and describe the intended change in one sentence
  - Only modify files directly relevant to the task. Do not touch unrelated files
  - Before making any fetch call, state the full URL and ask for confirmation

allowAnonymousTelemetry: false